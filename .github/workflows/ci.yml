name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('package.json', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run format check
        run: bun run format:check

      - name: Run type check
        run: bun tsc --noEmit

      - name: Run tests
        run: bun vitest --run
